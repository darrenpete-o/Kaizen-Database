name: Update Database Diagram

on:
  push:
    branches: [ main ]

jobs:
  update-diagram:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SQL Server ODBC Driver
        run: |
          # Install ODBC driver for SQL Server
          curl https://packages.microsoft.com/keys/microsoft.asc | apt-key add -
          curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list > /etc/apt/sources.list.d/mssql-release.list
          apt-get update
          ACCEPT_EULA=Y apt-get install -y msodbcsql18
          # Optional: Install tools for debugging
          ACCEPT_EULA=Y apt-get install -y mssql-tools18
          echo 'export PATH="$PATH:/opt/mssql-tools18/bin"' >> ~/.bashrc
          source ~/.bashrc
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyodbc pymssql openai
          echo "✅ Installed packages:"
          pip list | grep -E "pyodbc|pymssql|openai"

      - name: Verify OpenAI installation
        run: |
          python -c "import openai; print(f'✅ OpenAI version: {openai.__version__}')"

      # Step 1: Run script that creates view definitions first (for naming later)
      - name: Generate view definitions
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
        run: python generate_sql_definitions.py

      # Step 2: Run script that creates table definitions as a .dbml
      - name: Generate table definitions
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
        run: python generating_schema_diagram.py

      # Step 3: Run script that generates the .dbml file with business friendly names (depends on both previous scripts)
      - name: Generate DBML from Database
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python generate_business_friendly_names.py

      - name: Upload DBML to dbdiagram
        env:
          API_TOKEN: ${{ secrets.DBDIAGRAM_API_TOKEN }}
          DIAGRAM_ID: ${{ secrets.DIAGRAM_ID }}
        run: |
          curl --location --request PUT "https://api.dbdiagram.io/v1/diagrams/$DIAGRAM_ID" \
          --header "dbdiagram-access-token: $API_TOKEN" \
          --header "Content-Type: application/json" \
          --data "{
            \"name\": \"My Automated Diagram\",
            \"content\": $(cat schema.dbml | jq -Rs .)
          }"
