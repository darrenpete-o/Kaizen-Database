name: Update Database Diagram

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:
  
jobs:
  update-diagram:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyodbc pymssql openai pandas openpyxl
          echo "✅ Installed packages:"
          pip list | findstr "pyodbc pymssql openai pandas openpyxl"  # Windows uses findstr, not grep

      - name: Verify OpenAI installation
        run: |
          python -c "import openai; print(f'✅ OpenAI version: {openai.__version__}')"
          
      - name: Verify ODBC Driver
        run: |
          python -c "import pyodbc; print('Available ODBC drivers:'); print(pyodbc.drivers())"

          # Download baseline from previous run if it exists
      - name: Download baseline from artifacts
        uses: actions/download-artifact@v4
        with:
          name: database-baseline
          path: .
        continue-on-error: true  # Continue even if no baseline exists

      - name: Check for Changes
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
        run: python check_for_changes.py

      # Upload baseline for future runs - ONLY if script succeeded
      - name: Upload baseline for next run
        uses: actions/upload-artifact@v4
        if: success()  # Only upload if the monitoring script succeeded
        with:
          name: database-baseline
          path: database_baseline.json

      # Upload Excel report - ALWAYS (even if script had warnings)
      - name: Upload Excel Report
        uses: actions/upload-artifact@v4
        if: always()  # Always upload, even if script fails
        with:
          name: database-changes
          path: database_changes_*.xlsx
        
      - name: Generate view definitions
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
        run: python generate_sql_definitions.py

      - name: Generate table definitions
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
        run: python generating_schema_diagram.py

      - name: Generate business friendly names as dbml
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: 1
        run: python generate_business_friendly_names.py

      - name: Verify DBML file
        run: |
          if (Test-Path "schema_diagram_with_aliases_as_notes.dbml") {
            $content = Get-Content "schema_diagram_with_aliases_as_notes.dbml" -Raw
            Write-Host "✅ DBML file exists. Size: $($content.Length) characters"
          } else {
            Write-Host "❌ DBML file not found!"
            exit 1
          }

      - name: Debug - Show current directory and files
        run: |
          Write-Host "Current directory: $(Get-Location)"
          Write-Host "Files in current directory:"
          Get-ChildItem -File
          Write-Host "`nFull path of DBML file:"
          Resolve-Path "schema_diagram_with_aliases_as_notes.dbml" -ErrorAction SilentlyContinue

      - name: Upload DBML to dbdiagram
        timeout-minutes: 2
        env:
          API_TOKEN: ${{ secrets.DBDIAGRAM_API_TOKEN }}
          DIAGRAM_ID: ${{ secrets.DIAGRAM_ID }}
        shell: powershell
        run: |
          Write-Host "Reading DBML file..."
    
          $filePath = "C:\actions-runner\_work\Kaizen-Database\Kaizen-Database\schema_diagram_with_aliases_as_notes.dbml"
    
          if (-not (Test-Path $filePath)) {
            Write-Host "File not found!"
            exit 1
          }
    
          $content = [System.IO.File]::ReadAllText($filePath)
          Write-Host "Read $($content.Length) characters"
          Write-Host "Uploading to dbdiagram.io..."
    
          $body = @{
            name = "Kaizen Database Schema Diagram"
            content = $content
          } | ConvertTo-Json -Depth 10
    
          $headers = @{
            "dbdiagram-access-token" = $env:API_TOKEN
            "Content-Type" = "application/json"
          }
    
          $response = Invoke-RestMethod -Method Put -Uri "https://api.dbdiagram.io/v1/diagrams/$env:DIAGRAM_ID" -Headers $headers -Body $body -TimeoutSec 30
    
          Write-Host "Upload successful!"
          Write-Host "View your diagram at: https://dbdiagram.io/d/$env:DIAGRAM_ID"
