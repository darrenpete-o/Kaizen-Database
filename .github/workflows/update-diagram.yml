name: Update Database Diagram

on:
  push:
    branches: [ main ]

jobs:
  update-diagram:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyodbc pymssql openai
          echo "✅ Installed packages:"
          pip list | findstr "pyodbc pymssql openai"  # Windows uses findstr, not grep

      - name: Verify OpenAI installation
        run: |
          python -c "import openai; print(f'✅ OpenAI version: {openai.__version__}')"
          
      - name: Verify ODBC Driver
        run: |
          python -c "import pyodbc; print('Available ODBC drivers:'); print(pyodbc.drivers())"

      - name: Generate view definitions
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
        run: python generate_sql_definitions.py

      - name: Generate table definitions
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
        run: python generating_schema_diagram.py

      - name: Generate DBML from Database
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: 1
        run: python generate_business_friendly_names.py

      - name: Upload DBML to dbdiagram
        env:
          API_TOKEN: ${{ secrets.DBDIAGRAM_API_TOKEN }}
          DIAGRAM_ID: ${{ secrets.DIAGRAM_ID }}
        shell: pwsh
        run: |
          if (Test-Path "schema_diagram_with_aliases_as_notes.dbml") {
            $DBML_FILE = "schema_diagram_with_aliases_as_notes.dbml"
          } elseif (Test-Path "schema.dbml") {
            $DBML_FILE = "schema.dbml"
          } else {
            Write-Host "❌ No DBML file found!"
            exit 1
          }
          
          Write-Host "📄 Using DBML file: $DBML_FILE"
          $content = Get-Content $DBML_FILE -Raw | ConvertTo-Json -Compress
          $json = @{
            name = "Kaizen Database Schema Diagram"
            content = $content
          } | ConvertTo-Json
          
          curl --location --request PUT "https://api.dbdiagram.io/v1/diagrams/$env:DIAGRAM_ID" `
            --header "dbdiagram-access-token: $env:API_TOKEN" `
            --header "Content-Type: application/json" `
            --data $json
